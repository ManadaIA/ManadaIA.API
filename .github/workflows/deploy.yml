name: ManadaIA API - Deploy to Render

on:
  push:
    branches:
      - main 

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 01 - Checkout do código
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 02 - Build da imagem Docker
      # Ajustado com base no caminho que mostraste nos teus prints anteriores
      - name: Build Docker image
        run: docker build -t manadaia-api:ci -f src/ManadaIA.API/Dockerfile .
            
      # Step 03 - Login no Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Step 04 - Tag e Push da imagem
      - name: Push Docker image
        run: |
          docker tag manadaia-api:ci ${{ secrets.DOCKER_USERNAME }}/manadaia-api:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/manadaia-api:latest

      # Step 05 - Forçar o Deploy no Render via API
      - name: Trigger Render deploy (latest commit)
        run: |
          curl -sS -X POST "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/deploys" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache":"do_not_clear"}'
